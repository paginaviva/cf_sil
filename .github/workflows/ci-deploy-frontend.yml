name: CI - Deploy Frontend (CF Pages)

# Trigger: push a main cuando cambian archivos del frontend o este workflow.
# CF-FE-006: proyecto cb-consulting | CF-CORS-001: resolved
# Cadena: quality_baseline -> predeploy_gatekeeper -> deploy

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/ci-deploy-frontend.yml"
      - ".github/workflows/deploy_pages.yml"
      - ".github/workflows/cloudflare_reusable.yml"
      - ".github/inventario_recursos.md"
  workflow_dispatch:

jobs:
  deploy-frontend:
    uses: ./.github/workflows/deploy_pages.yml
    with:
      command: "pages deploy build/ --project-name=cb-consulting"
      working_directory: "frontend"
      pre_commands: "npm ci && npm run build"
      quality_commands: "npm ci && npm run build"
    secrets: inherit
