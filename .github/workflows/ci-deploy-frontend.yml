name: CI - Deploy Frontend (CF Pages)

# Trigger: push a main cuando cambian archivos del frontend o este workflow.
# CF-FE-006: proyecto cb-consulting | CF-CORS-001: resolved
# Cadena: quality_baseline (reusable) -> predeploy_gatekeeper (reusable) -> deploy (job plano, wrangler-action@v3 directo)

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/ci-deploy-frontend.yml"
      - ".github/inventario_recursos.md"
  workflow_dispatch:

jobs:
  quality:
    uses: ./.github/workflows/quality_baseline.yml
    with:
      working_directory: "frontend"
      quality_commands: "npm ci && npm run build"

  gatekeeper:
    needs: quality
    uses: ./.github/workflows/predeploy_gatekeeper.yml
    with:
      target_type: pages
      command: "pages deploy build/ --project-name=cb-consulting --branch=main --commit-dirty=true"
      working_directory: "frontend"
      requested_by: ${{ github.actor }}
      exception_request: false
      exception_reason: ""
      exception_expires_utc: ""
      exception_approved_by_user: false

  deploy:
    name: Deploy to Cloudflare Pages
    needs: gatekeeper
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: frontend
          command: pages deploy build/ --project-name=cb-consulting --branch=main --commit-dirty=true

      - name: Log deployment info
        if: success()
        run: |
          echo "Deployment URL: ${{ steps.deploy.outputs.deployment-url }}"
          echo "Pages URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}"
