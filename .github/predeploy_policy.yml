version: "1.0.0"
policy_id: "CF-PREDEPLOY-001"
owner_role: "AGTO"
last_updated: "2026-03-04"

source_of_truth:
  inventory_file: ".github/inventario_recursos.md"

status_model:
  allowed_values:
    - "pending"
    - "in_progress"
    - "resolved"
    - "blocked"

required_inventory_ids:
  global:
    - "CF-SEC-001"
    - "CF-SEC-002"
    - "CF-DEC-001"
  worker:
    - "CF-CORS-001"
  pages:
    - "CF-CORS-001"
  infra:
    - "CF-D1-001"

readiness_by_target:
  worker:
    required_files:
      - "wrangler.toml"
  pages:
    required_files:
      - "wrangler.toml"
  infra:
    required_files:
      - "wrangler.toml"

infra_allowlist:
  commands:
    - "^d1 create db_endes(\\s|$)"
    - "^d1 migrations apply db_endes(\\s|$)"

value_rules:
  cors:
    inventory_id: "CF-CORS-001"
    required_tokens:
      - "http://"
      - "https://"
    forbidden_tokens:
      - "pendiente"
      - "pending"
      - "placeholder"
      - "por definir"
      - "example.com"
  d1:
    inventory_id: "CF-D1-001"
    required_tokens:
      - "database_id"
    forbidden_tokens:
      - "pendiente"
      - "pending"
      - "database_id: pendiente"

exceptions:
  hotfix:
    enabled: true
    max_duration_hours: 24
    required_fields:
      - "exception_reason"
      - "exception_expires_utc"
      - "exception_approved_by_user"

traceability:
  required_fields:
    - "timestamp_utc"
    - "requested_by"
    - "target_type"
    - "command"
    - "decision"
    - "blocking_reasons"
